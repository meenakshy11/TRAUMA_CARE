
services:

  db:
    image: postgres:16-alpine
    container_name: trauma_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: trauma
      POSTGRES_PASSWORD: trauma
      POSTGRES_DB: trauma_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trauma -d trauma_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: trauma_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: trauma_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://trauma:trauma@db:5432/trauma_db
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: trauma-kerala-super-secret-key-change-in-production-256bit
      DEBUG: "true"
      DEMO_MODE: "true"
      CORS_ORIGINS: '["http://localhost:5173","http://localhost:3000"]'
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      target: dev
    container_name: trauma_web
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api/v1
      VITE_WS_BASE_URL: ws://localhost:8000
      VITE_DEMO_MODE: "false"
      VITE_APP_NAME: "Integrated Trauma Care Platform"
      VITE_MAP_DEFAULT_LAT: "10.8505"
      VITE_MAP_DEFAULT_LNG: "76.2711"
      VITE_MAP_DEFAULT_ZOOM: "8"
    depends_on:
      - backend
    volumes:
      - ./apps/web:/app
      - /app/node_modules

volumes:
  postgres_data:
    driver: local
